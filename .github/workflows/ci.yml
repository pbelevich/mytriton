name: CI

on:
  push:
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  check:
    name: Python ${{ matrix.python-version }}
    runs-on: ubuntu-latest
    timeout-minutes: 10

    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.10", "3.13"]

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
          cache: pip
          cache-dependency-path: pyproject.toml

      - name: Install project and development tools
        run: python -m pip install -e ".[dev]"

      - name: Run lint, type checks, and tests
        run: make check

      - name: Build wheel
        run: python -m pip wheel . --no-deps --wheel-dir dist

      - name: Verify typed package marker
        run: >-
          python -c "from pathlib import Path; from zipfile import ZipFile;
          wheel = next(Path('dist').glob('*.whl'));
          assert 'mytriton/py.typed' in ZipFile(wheel).namelist()"

  cuda:
    name: CUDA execution
    if: vars.CUDA_RUNNER_ENABLED == 'true'
    runs-on: [self-hosted, linux, gpu]
    timeout-minutes: 15

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.13"
          cache: pip
          cache-dependency-path: pyproject.toml

      - name: Install project with CUDA support
        run: python -m pip install -e ".[dev,cuda12]"

      - name: Require CUDA execution tests
        env:
          MYTRITON_REQUIRE_CUDA: "1"
        run: python -m pytest
